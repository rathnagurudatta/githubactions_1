name: Solar System Workflow

on: 
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/*'

env:
  MONGO_URI: 'mongodb+srv://supercluster.d83jj.mongodb.net/superData'   
  MONGO_USERNAME: ${{vars.MONGO_USERNAME}} 
  MONGO_PASSWORD: ${{secrets.MONGO_PASSWORD}}  
    
jobs:
    unit-testing:
        name: Unit Testing
        strategy:
          matrix:
            nodejs_version: [22, 23, 24]
            os: [ubuntu-latest, macos-latest]
            exclude:
              - nodejs_version: 22
                os: macos-latest
        runs-on: ${{ matrix.os }}
        steps:
        - name: Clean old test results
          run: rm -f test-results.xml

        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Setup NodeJS Version ${{ matrix.nodejs_version }}
          uses: actions/setup-node@v4
          with:
            node-version: ${{ matrix.nodejs_version }}
    
        - name: Install Dependencies
          run: npm install
    
        - name: Unit Testing
          id: nodejs-unit-testing-step # add id
          run: npm test
          
        - name: Archive Test Result
          if: steps.nodejs-unit-testing-step.outcome == 'failure' || steps.nodejs-unit-testing-step.outcome == 'success'
          uses: actions/upload-artifact@v4
          with:
            name: Mocha-Test-Result-${{ matrix.os }}-${{ matrix.nodejs_version }}
            path: test-results.xml

    code-coverage:
        name: Code Coverage
        runs-on: ubuntu-latest
        steps:
        - name: Clean old test results
          run: rm -f test-results.xml

        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Setup NodeJS Version -24
          uses: actions/setup-node@v4
          with:
            node-version: 24
    
        - name: Install Dependencies
          run: npm install
    
        - name: Check code coverage
          continue-on-error: true
          run: npm run coverage
          
        - name: Archive Coverage
          uses: actions/upload-artifact@v4
          with:
            name: Mocha-Test-Result-Coverage
            path: coverage
            retention-days: 3        

